<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg   { fill: #111111; }
    .text {
      font-family: 'Courier New', Courier, ui-monospace, monospace;
      font-size: 11px;
      font-weight: 700;
      fill: #F0F0F0;
      letter-spacing: -0.3px;
    }
    /* In light mode: flip to white bg / dark text so it still reads well */
    @media (prefers-color-scheme: light) {
      .bg   { fill: #111111; }
      .text { fill: #F0F0F0; }
    }
  </style>

  <!-- Background square -->
  <rect class="bg" width="32" height="32"/>

  <!-- "AR." logotype, centred -->
  <text class="text" x="16" y="21" text-anchor="middle">AR.</text>
</svg>
